<!DOCTYPE html>
<!--
1. Estructura Básica de HTML.

Estructura semántica: El HTML debe estar dividido en las etiquetas semánticas 
principales: header, nav, main, section, footer.

README.md: Incluir un archivo que explique brevemente el propósito de la página.


2. Formulario de Contacto.

Formulario funcional: Crear un formulario de contacto con campos para nombre, 
correo electrónico y mensaje, utilizando Formspree para manejar el envío de datos.


3. Estilos Básicos Aplicados con CSS

Archivo styles.css: El proyecto debe contar con un archivo CSS externo que incluya:  

Estilos básicos aplicados a las secciones de header, footer y lista de navegación.

Fuentes de Google Fonts correctamente implementadas.

Propiedades de background aplicadas en alguna sección de la página (color, 
imagen, degradado, etc.).


4. Diseño Responsivo con Flexbox y Grid

Sección "Productos": Organizada en cards de forma responsiva utilizando Flexbox.

Sección "Reseñas": Organizada utilizando Grid, con una distribución lógica y 
estética.

Sección "Contacto": Debe ser responsiva mediante el uso de Media Queries para 
adaptarse a diferentes tamaños de pantalla.


5. Contenido Multimedia y Navegación

Multimedia: deberá incluir archivos multimedia (imagenes, video o iframe) 
correctamente integrado en la página.

Lista de navegación: Implementar una lista desordenada con enlaces que 
simulen una navegación interna (Inicio, Productos, Contacto, etc.).


6. Subida del Proyecto.

El proyecto debe estar subido a un hosting gratuito (Netlify o GitHub Pages), 
con una URL funcional para visualizar el sitio.
-->
